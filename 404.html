<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 - Page Not Found</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .error-page { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
    .error-code { font-size: 8rem; font-weight: 700; color: #f97316; line-height: 1; }
    .error-msg { font-size: 1.5rem; color: #a3a3a3; margin: 1rem 0 2rem; }
  </style>
</head>
<body>
  <div class="error-page">
    <div class="error-code">404</div>
    <p class="error-msg">This page doesn't exist.</p>
    <a href="index.html" class="btn">Go Home</a>
  </div>
</body>
</html>
