<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact - Jumadevs Gallery</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav><div class="logo">Jumadevs Gallery</div></nav>
  <main style="max-width:600px;margin:8rem auto;padding:0 1.5rem;">
    <h1 style="font-size:2.5rem;margin-bottom:2rem;">Contact Us</h1>
    <form id="contactForm" style="display:flex;flex-direction:column;gap:1.5rem;">
      <input type="text" placeholder="Name" required style="background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:0.75rem;color:#e5e5e5;" />
      <input type="email" placeholder="Email" required style="background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:0.75rem;color:#e5e5e5;" />
      <textarea placeholder="Message" rows="5" required style="background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:0.75rem;color:#e5e5e5;"></textarea>
      <button type="submit" class="btn">Send</button>
    </form>
  </main>
</body>
</html>
