<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact - Jumadevs Gallery</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav><div class="logo">Jumadevs Gallery</div><a href="index.html" style="color:#a3a3a3;text-decoration:none;">← Back</a></nav>
  <main style="max-width:600px;margin:8rem auto;padding:0 1.5rem;">
    <h1 style="font-size:2.5rem;margin-bottom:0.5rem;">Contact Us</h1>
    <p style="color:#a3a3a3;margin-bottom:2rem;">We'd love to hear from you.</p>
    <form id="contactForm" style="display:flex;flex-direction:column;gap:1.5rem;">
      <input type="text" placeholder="Your name" required style="background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:0.75rem;color:#e5e5e5;" />
      <input type="email" placeholder="you@example.com" required style="background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:0.75rem;color:#e5e5e5;" />
      <textarea placeholder="Tell us something..." rows="5" required style="background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:0.75rem;color:#e5e5e5;font-family:inherit;"></textarea>
      <button type="submit" class="btn">Send Message</button>
    </form>
  </main>
  <script src="contact.js"></script>
</body>
</html>
